<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthwave Music Visualizer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Immersive layout overrides */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #visualizer-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Glassmorphism Control Panel */
        .control-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: opacity 0.5s ease-in-out, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Geist', 'Outfit', sans-serif;
            color: #fff;
        }

        .control-panel.hidden {
            opacity: 0;
            transform: translate(-50%, 20px);
            pointer-events: none;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-header h2 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        .back-btn-minimal {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-btn-minimal:hover {
            color: #fff;
        }

        .audio-input-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .file-upload-btn {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            flex-grow: 1;
            text-align: center;
        }

        .file-upload-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .file-upload-btn input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .play-demo-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .play-demo-btn:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .track-info {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 20px;
        }

        /* Toggle Switch for Peak Reactivity */
        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
        }

        .toggle-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .toggle-options {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
        }

        .toggle-opt {
            padding: 6px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .toggle-opt.active {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--neon-cyan);
            font-family: monospace;
            font-size: 1.2rem;
            transition: opacity 0.5s;
        }
    </style>

    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading-overlay">Khởi tạo Không gian 3D...</div>

    <canvas id="visualizer-canvas"></canvas>

    <div class="control-panel" id="ui-panel">
        <div class="control-header">
            <h2>Audio Matrix</h2>
            <a href="index.html" class="back-btn-minimal">← Quay lại</a>
        </div>

        <div class="audio-input-group">
            <div class="file-upload-btn">
                <span>📂 Chọn file Audio</span>
                <input type="file" id="audio-upload" accept="audio/*">
            </div>
            <button id="demo-btn" class="play-demo-btn">▶ Chạy Demo</button>
        </div>

        <div class="track-info" id="track-name">Chưa có âm thanh</div>


    </div>

    <!-- Cần một file mp3 demo ngắn -->
    <audio id="demo-audio" src="https://assets.codepen.io/1468070/The+Weeknd+-+Blinding+Lights+%28Instrumental%29.mp3" crossorigin="anonymous"></audio>

    <script src="js/main.js"></script>
    <script type="module" src="js/music_visualizer.js"></script>
</body>
</html>
